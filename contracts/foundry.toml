[profile.default]
src = "src"
out = "out"
libs = ["lib", "dependencies"]
evm_version = "paris"
optimizer = true
optimizer_runs = 200
via_ir = true

[dependencies]
solady = { version = "0.0.210" }
forge-std = { version = "1.8.2" }
"@openzeppelin-contracts" = { version = "5.0.2" }

[rpc_endpoints]
worldchain = "https://worldchain-mainnet.g.alchemy.com/public"
